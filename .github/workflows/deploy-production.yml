name: Deploy production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA or branch to deploy
        required: true
        default: hlow

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy monolith
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Update and verify production stack
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REF: ${{ inputs.ref }}
        run: |
          ssh -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && \
             git fetch --prune origin '$DEPLOY_REF' && \
             git checkout --detach FETCH_HEAD && \
             docker compose --env-file backend/infra/production/.env \
               -f backend/infra/production/compose.yaml up -d --build --wait --remove-orphans && \
             docker compose --env-file backend/infra/production/.env \
               -f backend/infra/production/compose.yaml ps --status running --services | grep -qx monolith"
