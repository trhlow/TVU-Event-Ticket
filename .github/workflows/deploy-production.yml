name: Deploy production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA or branch to deploy
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy monolith
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate deploy ref
        env:
          DEPLOY_REF: ${{ inputs.ref }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # The ref is interpolated into a remote shell command, so restrict it to a safe charset
          # (git ref names plus SHAs). This rejects quotes, spaces and shell metacharacters that could
          # otherwise break out of the quoting and inject commands on the production host.
          if ! printf '%s' "$DEPLOY_REF" | grep -Eq '^[A-Za-z0-9._/-]+$'; then
            echo "Invalid ref '$DEPLOY_REF': only letters, digits and . _ / - are allowed" >&2
            exit 1
          fi
          if ! printf '%s' "$DEPLOY_PATH" | grep -Eq '^/[A-Za-z0-9._/-]+$'; then
            echo "DEPLOY_PATH must be an absolute path using letters, digits and . _ / -" >&2
            exit 1
          fi

      - name: Configure SSH
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Pin the host key from a protected secret instead of trusting whatever ssh-keyscan returns at
          # run time (trust-on-first-use is not identity verification and is open to MITM). Populate the
          # secret once with the host's known public key, e.g. `ssh-keyscan host` verified out of band.
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Update and verify production stack
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_REF: ${{ inputs.ref }}
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_REF='$DEPLOY_REF' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          if [[ -n "$(git status --porcelain --untracked-files=no)" ]]; then
            echo "Production checkout has modified tracked files; refusing to overwrite them" >&2
            exit 1
          fi
          previous_ref="$(git rev-parse HEAD)"
          git fetch --prune origin "$DEPLOY_REF"
          git checkout --detach FETCH_HEAD
          PREVIOUS_REF="$previous_ref" bash backend/infra/production/scripts/deploy.sh
          REMOTE
