name: CI

on:
  push:
    branches: [main, hlow]
  pull_request:
    branches: [main]

jobs:
  # The backend is a single Maven module.  Keep frontend checks independent so
  # a UI-only change does not need a Java build and vice versa.
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/pom.xml'
              - 'backend/Dockerfile'
              - 'backend/monolith/**'
              - 'backend/infra/**'
              - 'backend/.claude/**'
            frontend:
              - 'frontend/**'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build & test modular monolith
        working-directory: backend
        run: mvn -B -pl monolith -am verify

      - name: Cache dependency vulnerability data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-${{ runner.os }}-v1

      - name: Dependency vulnerability scan
        working-directory: backend
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn -B -pl monolith -am org.owasp:dependency-check-maven:12.1.1:check -DfailBuildOnCVSS=7 -DnvdApiKey="$NVD_API_KEY"

      - name: Fail if any test was skipped
        working-directory: backend
        run: |
          reports=$(find monolith/target/surefire-reports -name 'TEST-*.xml' 2>/dev/null || true)
          if [ -z "$reports" ]; then
            echo "No surefire reports found for monolith — the suite did not run."
            exit 1
          fi
          skipped=$(grep -ho 'skipped="[0-9]*"' $reports | grep -o '[0-9]*' | awk '{s+=$1} END {print s+0}')
          if [ "$skipped" -ne 0 ]; then
            echo "$skipped test(s) were skipped. Testcontainers tests skip silently without Docker —"
            echo "a skipped run is not a passing run. Failing the build."
            grep -l 'skipped="[1-9]' $reports || true
            exit 1
          fi
          echo "No tests were skipped."

      - name: Build deployable monolith image
        working-directory: backend
        run: docker build -t tvu/monolith:ci .

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    env:
      # Safe, non-production defaults so the build never needs real secrets and never ships
      # with DevStub, demo data, or mock fallback baked in.
      VITE_APP_ENV: production
      VITE_AUTH_PROVIDER: microsoft
      VITE_USE_DEMO_DATA: 'false'
      VITE_ENABLE_MOCK_FALLBACK: 'false'
      VITE_API_BASE_URL: http://localhost:8080/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm run test -- --run

      - name: Build (production-safe env)
        working-directory: frontend
        run: npm run build

      - name: Audit dependencies (non-blocking)
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Fail if a real .env file was accidentally committed
        run: |
          if git ls-files frontend | grep -E '^frontend/\.env($|\.[^.]*$)' | grep -v '\.env\.example$'; then
            echo "A real .env file is tracked in git — remove it and rotate any secrets it held."
            exit 1
          fi
          echo "No tracked .env file found."

      - name: Fail if the production bundle contains DevStub UI or demo account strings
        working-directory: frontend
        run: |
          if grep -rl "DEV ONLY\|admin@example.com" dist/assets/*.js 2>/dev/null; then
            echo "Production bundle contains dev-only login UI or a default admin account string."
            exit 1
          fi
          echo "Production bundle is clean."
