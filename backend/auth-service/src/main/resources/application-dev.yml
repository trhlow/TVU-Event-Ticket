# Local development (docker-compose in ../../../infra)
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tvu_auth
    username: tvu
    password: tvu
  jpa:
    show-sql: true
    properties:
      hibernate.format_sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

tvu:
  auth:
    csrf:
      signing-secret: ${CSRF_SIGNING_SECRET:dev-csrf-signing-secret-change-me}
    bootstrap:
      email: ${BOOTSTRAP_ADMIN_EMAIL:admin@example.com}
    cookies:
      secure: false
      same-site: Lax

logging:
  level:
    vn.edu.tvu: DEBUG
