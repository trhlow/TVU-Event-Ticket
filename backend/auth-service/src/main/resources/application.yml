# Common config. Environment-specific values live in application-{dev,prod}.yml
server:
  port: 8084
  tomcat:
    threads:
      max: 20

spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    # Flyway owns the schema; Hibernate only validates it matches the entities
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          # auth-service issues AND validates the internal JWT — issuer-uri points at itself.
          # Every other service/gateway points its issuer-uri here (default dev :8084, prod JWT_ISSUER_URI).
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8084}

management:
  endpoints:
    web:
      exposure:
        include: health, info

tvu:
  auth:
    jwt:
      issuer: ${JWT_ISSUER_URI:http://localhost:8084}
      ttl: ${JWT_TTL:15m}
      key-id: ${JWT_KEY_ID:auth-service-dev}
