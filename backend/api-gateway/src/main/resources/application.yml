# Common config (routes + CORS). Env-specific hosts live in application-{dev,prod}.yml
server:
  port: 8080

spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8084}
  cloud:
    gateway:
      server:
        webflux:
          # Centralized CORS (§6.2): explicit origins, never "*" when credentials are allowed
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins: ${FRONTEND_ORIGIN:http://localhost:5173}
                allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
                allowedHeaders: [Authorization, Content-Type, X-XSRF-TOKEN, Idempotency-Key, Accept]
                allowCredentials: true
          routes:
            # auth-service owns login/profile, admin management, and JWKS/OIDC discovery.
            - id: auth-service
              uri: ${AUTH_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/api/auth/**, /api/admin/**, /.well-known/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
            - id: event-service
              uri: ${EVENT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/events/**
              filters:
                # Redis-backed rate limiter = spam/bot protection only, NOT identity (§6.3)
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
            - id: ticket-service
              uri: ${TICKET_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/api/tickets/**, /api/reservations/**, /api/ticketing/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20

management:
  endpoints:
    web:
      exposure:
        include: health, info
