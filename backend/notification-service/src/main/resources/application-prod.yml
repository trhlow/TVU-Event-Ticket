# Production: CloudAMQP (RabbitMQ) + SMTP provider.
# All values required from env — no fallback defaults.
spring:
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:true}
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

tvu:
  notification:
    mail:
      from-address: ${MAIL_FROM_ADDRESS}
      from-name: ${MAIL_FROM_NAME}
    qr:
      signing-secret: ${QR_SIGNING_SECRET}

logging:
  level:
    root: INFO
    vn.edu.tvu: INFO
