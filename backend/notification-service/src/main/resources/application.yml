# Common config. Environment-specific values live in application-{dev,prod}.yml
server:
  port: 8083
  tomcat:
    threads:
      max: 20

spring:
  application:
    name: notification-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  rabbitmq:
    listener:
      simple:
        # Failed deliveries go to the Dead Letter Queue rather than being requeued forever (§6.4)
        default-requeue-rejected: false
        # Bounded retry with backoff so a transient SMTP/lock blip recovers without a DLQ round-trip;
        # only failures that persist past the last attempt are rejected (see NotificationRabbitConfig DLX).
        retry:
          enabled: true
          max-attempts: 5
          initial-interval: 500ms
          multiplier: 2.0
          max-interval: 5s

tvu:
  notification:
    idempotency:
      done-ttl: P30D
      lock-ttl: PT2M
    mail:
      from-address: ${MAIL_FROM_ADDRESS:no-reply@tvu.edu.vn}
      from-name: ${MAIL_FROM_NAME:TVU Events}
    qr:
      signing-secret: ${QR_SIGNING_SECRET:dev-qr-signing-secret-change-me-1234567890}
    rabbit:
      exchange: tvu.events
      queue: notification.reservation-approved
      routing-key: reservation.approved
      dead-letter-exchange: tvu.events.notification.dlx
      dead-letter-queue: notification.reservation-approved.dlq

management:
  endpoints:
    web:
      exposure:
        include: health, info
