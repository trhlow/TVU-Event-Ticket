# Common config. Environment-specific values live in application-{dev,prod}.yml
server:
  port: 8083

spring:
  application:
    name: notification-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  rabbitmq:
    listener:
      simple:
        # Failed deliveries go to the Dead Letter Queue rather than being requeued forever (§6.4)
        default-requeue-rejected: false

# Secret used to HMAC-sign QR payloads (§6.6). Must be set per environment.
app:
  qr:
    signing-secret: ${QR_SIGNING_SECRET:change-me-in-env}

management:
  endpoints:
    web:
      exposure:
        include: health, info
