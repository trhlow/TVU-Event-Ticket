# Local development (docker-compose in ../../../infra)
spring:
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  mail:
    host: localhost
    port: 1025          # e.g. MailHog / Mailpit for local testing
    username:
    password:

logging:
  level:
    vn.edu.tvu: DEBUG

management:
  health:
    mail:
      enabled: false
