services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: tvu
      POSTGRES_PASSWORD: tvu
      POSTGRES_DB: tvu_app
    ports: ["5432:5432"]
    volumes: ["monolith-pgdata:/var/lib/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tvu -d tvu_app -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 12

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports: ["5672:5672", "15672:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  mailpit:
    image: axllent/mailpit:v1.26
    ports: ["1025:1025", "8025:8025"]

  monolith:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev,monolith
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tvu_app
      SPRING_DATASOURCE_USERNAME: tvu
      SPRING_DATASOURCE_PASSWORD: tvu
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      JWT_ISSUER_URI: http://localhost:8080
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }
      mailpit: { condition: service_started }
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /actuator/health HTTP/1.1\\r\\nHost: x\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '\"status\":\"UP\"' <&3"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

volumes:
  monolith-pgdata:
