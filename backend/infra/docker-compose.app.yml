# Full backend stack for local container smoke tests.
# The lighter docker-compose.yml remains dependency-only for day-to-day IDE work.
services:
  postgres:
    extends:
      file: docker-compose.yml
      service: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tvu"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  redis:
    extends:
      file: docker-compose.yml
      service: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  rabbitmq:
    extends:
      file: docker-compose.yml
      service: rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mailpit:
    image: axllent/mailpit:v1.26
    ports:
      - "1025:1025"
      - "8025:8025"

  api-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JWT_ISSUER_URI: http://auth-service:8084
      AUTH_SERVICE_URI: http://auth-service:8084
      EVENT_SERVICE_URI: http://event-service:8081
      TICKET_SERVICE_URI: http://ticket-service:8082
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_SSL_ENABLED: false
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/localhost/8080 && printf ''GET /actuator/health HTTP/1.1\r\nHost: x\r\nConnection: close\r\n\r\n'' >&3 && grep -q ''"status":"UP"'' <&3'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    depends_on:
      auth-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
      ticket-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  auth-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE: auth-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tvu_auth
      SPRING_DATASOURCE_USERNAME: tvu
      SPRING_DATASOURCE_PASSWORD: tvu
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      JWT_ISSUER_URI: http://auth-service:8084
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/localhost/8084 && printf ''GET /actuator/health HTTP/1.1\r\nHost: x\r\nConnection: close\r\n\r\n'' >&3 && grep -q ''"status":"UP"'' <&3'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8084:8084"

  event-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE: event-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tvu_event
      SPRING_DATASOURCE_USERNAME: tvu
      SPRING_DATASOURCE_PASSWORD: tvu
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      JWT_ISSUER_URI: http://auth-service:8084
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/localhost/8081 && printf ''GET /actuator/health HTTP/1.1\r\nHost: x\r\nConnection: close\r\n\r\n'' >&3 && grep -q ''"status":"UP"'' <&3'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8081:8081"

  ticket-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE: ticket-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tvu_ticket
      SPRING_DATASOURCE_USERNAME: tvu
      SPRING_DATASOURCE_PASSWORD: tvu
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      JWT_ISSUER_URI: http://auth-service:8084
      EVENT_SERVICE_URI: http://event-service:8081
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/localhost/8082 && printf ''GET /actuator/health HTTP/1.1\r\nHost: x\r\nConnection: close\r\n\r\n'' >&3 && grep -q ''"status":"UP"'' <&3'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8082:8082"

  notification-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE: notification-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      MAIL_FROM_ADDRESS: no-reply@tvu.edu.vn
      MAIL_FROM_NAME: TVU Events
      QR_SIGNING_SECRET: dev-qr-signing-secret-change-me-1234567890
    healthcheck:
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/localhost/8083 && printf ''GET /actuator/health HTTP/1.1\r\nHost: x\r\nConnection: close\r\n\r\n'' >&3 && grep -q ''"status":"UP"'' <&3'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "8083:8083"

volumes:
  pgdata:
