# Full backend stack for local container smoke tests.
# The lighter docker-compose.yml remains dependency-only for day-to-day IDE work.
services:
  postgres:
    extends:
      file: docker-compose.yml
      service: postgres

  redis:
    extends:
      file: docker-compose.yml
      service: redis

  rabbitmq:
    extends:
      file: docker-compose.yml
      service: rabbitmq

  api-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JWT_ISSUER_URI: http://auth-service:8084
      AUTH_SERVICE_URI: http://auth-service:8084
      EVENT_SERVICE_URI: http://event-service:8081
      TICKET_SERVICE_URI: http://ticket-service:8082
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_SSL_ENABLED: false
    depends_on:
      - auth-service
      - event-service
      - ticket-service
      - redis
    ports:
      - "8080:8080"

  auth-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE: auth-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tvu_auth
      SPRING_DATASOURCE_USERNAME: tvu
      SPRING_DATASOURCE_PASSWORD: tvu
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      JWT_ISSUER_URI: http://auth-service:8084
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "8084:8084"

  event-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE: event-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tvu_event
      SPRING_DATASOURCE_USERNAME: tvu
      SPRING_DATASOURCE_PASSWORD: tvu
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      JWT_ISSUER_URI: http://auth-service:8084
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "8081:8081"

  ticket-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE: ticket-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tvu_ticket
      SPRING_DATASOURCE_USERNAME: tvu
      SPRING_DATASOURCE_PASSWORD: tvu
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      JWT_ISSUER_URI: http://auth-service:8084
      EVENT_SERVICE_URI: http://event-service:8081
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "8082:8082"

  notification-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE: notification-service
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      - rabbitmq
    ports:
      - "8083:8083"

volumes:
  pgdata:
