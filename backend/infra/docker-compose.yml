# Local development dependencies for the backend.
# Cloud deployment uses managed free-tier equivalents (Neon, CloudAMQP, Upstash) — see proposal §7.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tvu
      POSTGRES_PASSWORD: tvu
      # event-service and ticket-service use separate logical DBs; create tvu_ticket manually or via init script
      POSTGRES_DB: tvu_event
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # management UI (guest/guest)

volumes:
  pgdata:
