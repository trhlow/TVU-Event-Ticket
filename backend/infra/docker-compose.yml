# Local development dependencies for the backend.
# Production uses the compose stack under production/. This file is only for
# starting the monolith's local dependencies independently.
services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: tvu
      POSTGRES_PASSWORD: tvu
      POSTGRES_DB: tvu_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # management UI (guest/guest)

volumes:
  pgdata:
