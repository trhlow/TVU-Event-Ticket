# Dev-only nginx config, mounted over the image's default. It gives the browser a single origin the
# way Caddy does in production: the SPA is served here and /api is proxied to the monolith, so there is
# no cross-origin request and the auth cookies just work. The production nginx.conf stays static-only
# because Caddy owns the /api routing there.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://monolith:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
