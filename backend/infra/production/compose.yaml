name: tvu-event-ticket

services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
      monolith:
        condition: service_healthy
    networks:
      - public
      - application
    logging: &json_logging
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ../../../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_APP_ENV: production
        VITE_AUTH_PROVIDER: microsoft
        VITE_USE_DEMO_DATA: "false"
        VITE_ENABLE_MOCK_FALLBACK: "false"
        VITE_MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
        VITE_MICROSOFT_REDIRECT_URI: https://${APP_DOMAIN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - public
    logging: *json_logging

  monolith:
    image: ${MONOLITH_IMAGE:-tvu-event-ticket-monolith:local}
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      SPRING_PROFILES_ACTIVE: prod,monolith
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATA_REDIS_SSL_ENABLED: "false"
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      SPRING_RABBITMQ_VHOST: /
      JAVA_TOOL_OPTIONS: -XX:+UseSerialGC -Xss512k -Xms128m -Xmx768m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080 && printf \"GET /actuator/health HTTP/1.1\\r\\nHost: x\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q '\"status\":\"UP\"' <&3'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - application
    logging: *json_logging

  postgres:
    image: postgres:18.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - application
    logging: *json_logging

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - application
    logging: *json_logging

  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 6
    networks:
      - application
    logging: *json_logging

networks:
  public:
  application:
    internal: true

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  rabbitmq_data:
