# Common config. Environment-specific values live in application-{dev,prod}.yml
server:
  port: 8082

spring:
  application:
    name: ticket-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    # Flyway owns the schema; Hibernate only validates it matches the entities
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8084}

management:
  endpoints:
    web:
      exposure:
        include: health, info

tvu:
  ticket:
    event-client:
      base-url: ${EVENT_SERVICE_URI:http://localhost:8081}
      timeout: ${EVENT_SERVICE_TIMEOUT:3s}
