# Common config. Environment-specific values live in application-{dev,prod}.yml
server:
  port: 8081

spring:
  application:
    name: event-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    # Flyway owns the schema; Hibernate only validates it matches the entities
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          # Internal JWT issued by the auth flow after Microsoft Entra ID login (§6.8)
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8084}

management:
  endpoints:
    web:
      exposure:
        include: health, info
